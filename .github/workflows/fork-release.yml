name: fork-release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
      - "rust-v*.*.*"
      - "codex-v*.*.*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish. Defaults to rust-v<Cargo.toml version>."
        required: false

concurrency:
  group: fork-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.metadata.outputs.should_release }}
      version: ${{ steps.metadata.outputs.version }}
      deb_version: ${{ steps.metadata.outputs.deb_version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      repo: ${{ steps.metadata.outputs.repo }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0

      - id: metadata
        name: Resolve release metadata
        shell: bash
        env:
          REQUESTED_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
          PUBLISHED_RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
        run: |
          set -euo pipefail

          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' codex-rs/Cargo.toml | head -n 1)"
          release_tag="$REQUESTED_RELEASE_TAG"
          should_release="true"

          if [[ -z "$release_tag" && "$GITHUB_EVENT_NAME" == "release" ]]; then
            release_tag="$PUBLISHED_RELEASE_TAG"
          fi

          if [[ -z "$release_tag" && "$GITHUB_REF_TYPE" == "tag" ]]; then
            release_tag="$GITHUB_REF_NAME"
          fi

          if [[ "$GITHUB_EVENT_NAME" == "release" && ! "$release_tag" =~ ^(v|rust-v|codex-v)[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            {
              echo "should_release=false"
              echo "repo=$GITHUB_REPOSITORY"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "$release_tag" && "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF_TYPE" == "branch" ]]; then
            git fetch --tags --force origin '+refs/tags/v*:refs/tags/v*' '+refs/tags/rust-v*:refs/tags/rust-v*'

            plan="$(scripts/release/next-fork-release.py)"
            while IFS='=' read -r key value; do
              case "$key" in
                should_release) should_release="$value" ;;
                version) version="$value" ;;
                release_tag) release_tag="$value" ;;
                previous_tag) previous_tag="$value" ;;
                bump) bump="$value" ;;
              esac
            done <<< "$plan"

            if [[ "$should_release" != "true" ]]; then
              {
                echo "should_release=false"
                echo "version=${version:-$cargo_version}"
                echo "release_tag=${release_tag:-rust-v$cargo_version}"
                echo "repo=$GITHUB_REPOSITORY"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Preparing fork release ${release_tag} (${bump:-unknown} from ${previous_tag:-workspace version})."

            if git rev-parse -q --verify "refs/tags/${release_tag}" >/dev/null; then
              echo "Release tag ${release_tag} already exists." >&2
              exit 1
            fi

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            if [[ "$version" != "$cargo_version" ]]; then
              scripts/release/set-workspace-version.py --version "$version"
              (cd codex-rs && cargo metadata --format-version=1 >/dev/null)

              git add codex-rs/Cargo.toml codex-rs/Cargo.lock
              git commit -m "chore(release): ${release_tag} [skip ci]"
              git push origin "HEAD:${GITHUB_REF_NAME}"
            fi

            git tag -a "$release_tag" -m "Release ${version}"
            git push origin "$release_tag"
          fi

          if [[ -z "$release_tag" ]]; then
            release_tag="rust-v${cargo_version}"
          fi

          version="$release_tag"
          version="${version#codex-v}"
          version="${version#rust-v}"
          version="${version#v}"

          if [[ -z "$version" ]]; then
            echo "Unable to derive version from release tag: $release_tag" >&2
            exit 1
          fi

          # Debian prereleases sort naturally when hyphenated semver suffixes are mapped to '~'.
          deb_version="${version//-/~}"

          {
            echo "should_release=$should_release"
            echo "version=$version"
            echo "deb_version=$deb_version"
            echo "release_tag=$release_tag"
            echo "repo=$GITHUB_REPOSITORY"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: metadata
    if: needs.metadata.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16
      CARGO_PROFILE_RELEASE_LTO: thin
    defaults:
      run:
        working-directory: codex-rs
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15
            target: x86_64-apple-darwin
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            deb_arch: amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            deb_arch: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.metadata.outputs.release_tag }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            binutils \
            libcap-dev \
            pkg-config

      - name: Install UBSan runtime for musl builds
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libubsan1

      - uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26 # 1.93.0
        with:
          targets: ${{ matrix.target }}

      - name: Use hermetic Cargo home for musl builds
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cargo_home="${GITHUB_WORKSPACE}/.cargo-home"
          mkdir -p "${cargo_home}/bin"
          echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"
          echo "${cargo_home}/bin" >> "$GITHUB_PATH"
          : > "${cargo_home}/config.toml"

      - name: Install Zig for musl builds
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.14.0

      - name: Install musl build tools
        if: runner.os == 'Linux'
        env:
          TARGET: ${{ matrix.target }}
        run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"

      - name: Configure rustc UBSan wrapper for musl host builds
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          ubsan=""
          if command -v ldconfig >/dev/null 2>&1; then
            ubsan="$(ldconfig -p | grep -m1 'libubsan\.so\.1' | sed -E 's/.*=> (.*)$/\1/')"
          fi
          wrapper_root="${RUNNER_TEMP:-/tmp}"
          wrapper="${wrapper_root}/rustc-ubsan-wrapper"
          cat > "${wrapper}" <<EOF
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ -n "${ubsan}" ]]; then
            export LD_PRELOAD="${ubsan}\${LD_PRELOAD:+:\${LD_PRELOAD}}"
          fi
          exec "\$1" "\${@:2}"
          EOF
          chmod +x "${wrapper}"
          echo "RUSTC_WRAPPER=${wrapper}" >> "$GITHUB_ENV"
          echo "RUSTC_WORKSPACE_WRAPPER=" >> "$GITHUB_ENV"

      - name: Clear sanitizer flags for musl builds
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          target_no_jitter="AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}"
          target_no_jitter="${target_no_jitter//-/_}"

          {
            echo "AWS_LC_SYS_NO_JITTER_ENTROPY=1"
            echo "${target_no_jitter}=1"
            echo "RUSTFLAGS="
            echo "CARGO_ENCODED_RUSTFLAGS="
            echo "RUSTDOCFLAGS="
            echo "CARGO_BUILD_RUSTFLAGS="
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS="
            echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS="
          } >> "$GITHUB_ENV"

          sanitize_flags() {
            local input="$1"
            input="${input//-fsanitize=undefined/}"
            input="${input//-fno-sanitize-recover=undefined/}"
            input="${input//-fno-sanitize-trap=undefined/}"
            echo "$input"
          }

          cflags="$(sanitize_flags "${CFLAGS-}")"
          cxxflags="$(sanitize_flags "${CXXFLAGS-}")"
          {
            echo "CFLAGS=${cflags}"
            echo "CXXFLAGS=${cxxflags}"
          } >> "$GITHUB_ENV"

      - name: Configure musl rusty_v8 artifact overrides
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-rusty-v8-musl
        with:
          target: ${{ matrix.target }}

      - name: Build codex
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if cargo build --locked --target "${{ matrix.target }}" --release --package codex-cli --bin codex; then
              exit 0
            fi

            status=$?
            if [[ "$attempt" == 3 ]]; then
              exit "$status"
            fi

            echo "::warning title=Build retry::cargo build failed with status $status; retrying in $((attempt * 30)) seconds."
            sleep "$((attempt * 30))"
          done

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          out_dir="$GITHUB_WORKSPACE/dist"
          package_dir="$RUNNER_TEMP/codex-${{ matrix.target }}"
          mkdir -p "$out_dir" "$package_dir"
          cp "target/${{ matrix.target }}/release/codex" "$package_dir/codex"
          chmod 0755 "$package_dir/codex"
          tar -C "$package_dir" -czf "$out_dir/codex-${{ matrix.target }}.tar.gz" codex

      - name: Package Debian archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          "$GITHUB_WORKSPACE/scripts/release/build-deb.sh" \
            --binary "target/${{ matrix.target }}/release/codex" \
            --version "${{ needs.metadata.outputs.version }}" \
            --deb-version "${{ needs.metadata.outputs.deb_version }}" \
            --arch "${{ matrix.deb_arch }}" \
            --output "$GITHUB_WORKSPACE/dist/codex-${{ matrix.deb_arch }}.deb" \
            --repo-url "https://github.com/${{ needs.metadata.outputs.repo }}"

      - name: Verify Linux binary does not require glibc
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          binary="target/${{ matrix.target }}/release/codex"
          if readelf --version-info "$binary" 2>/dev/null | grep -q 'GLIBC_'; then
            echo "Linux release binary must not require glibc symbols." >&2
            readelf --version-info "$binary" >&2
            exit 1
          fi
          "$binary" --version

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  release:
    name: Publish GitHub release
    needs:
      - metadata
      - build
    if: needs.metadata.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.metadata.outputs.version }}
      release_tag: ${{ needs.metadata.outputs.release_tag }}
      repo: ${{ needs.metadata.outputs.repo }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.metadata.outputs.release_tag }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/artifacts

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release
          find dist/artifacts -maxdepth 3 -type f -exec cp {} dist/release/ \;
          cp scripts/install/install-deb.sh dist/release/install-deb.sh
          chmod 0644 dist/release/*
          (
            cd dist/release
            sha256sum codex-* install-deb.sh > SHA256SUMS
          )
          ls -lh dist/release

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          name: ${{ needs.metadata.outputs.version }}
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          generate_release_notes: true
          files: dist/release/*

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: release
    if: needs.release.outputs.release_tag != ''
    runs-on: ubuntu-latest
    env:
      TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY || 'daulet/homebrew-tap' }}
      TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN || secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check tap token
        id: tap_token
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$TAP_GITHUB_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Homebrew tap update skipped::Set TAP_GITHUB_TOKEN to update $TAP_REPOSITORY automatically."
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.tap_token.outputs.available == 'true'
        with:
          path: codex

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.tap_token.outputs.available == 'true'
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ env.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Download release checksums
        if: steps.tap_token.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ needs.release.outputs.release_tag }}" \
            --repo "${{ needs.release.outputs.repo }}" \
            --pattern SHA256SUMS \
            --dir dist

      - name: Update Formula/codex.rb
        if: steps.tap_token.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 codex/scripts/release/update-homebrew-formula.py \
            --tap-root homebrew-tap \
            --version "${{ needs.release.outputs.version }}" \
            --release-tag "${{ needs.release.outputs.release_tag }}" \
            --repo "${{ needs.release.outputs.repo }}" \
            --sha256sums dist/SHA256SUMS

      - name: Commit and push formula
        if: steps.tap_token.outputs.available == 'true'
        shell: bash
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          if [[ -z "$(git status --short -- Formula/codex.rb)" ]]; then
            echo "Formula/codex.rb is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/codex.rb
          git commit -m "Update codex to ${{ needs.release.outputs.version }}"
          git push

  update-apt-repo:
    name: Update APT repository
    needs: release
    if: needs.release.outputs.release_tag != ''
    runs-on: ubuntu-latest
    env:
      PACKAGES_REPOSITORY: ${{ vars.PACKAGES_REPOSITORY || 'daulet/packages' }}
      PACKAGES_REPO_TOKEN: ${{ secrets.PACKAGES_REPO_TOKEN || secrets.TAP_GITHUB_TOKEN || secrets.HOMEBREW_TAP_TOKEN }}
      PACKAGE_RELEASE_TAG: codex-${{ needs.release.outputs.release_tag }}
    steps:
      - name: Check packages token
        id: packages_token
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$PACKAGES_REPO_TOKEN" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=APT repository update skipped::Set PACKAGES_REPO_TOKEN with contents write access to $PACKAGES_REPOSITORY."
          fi

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        if: steps.packages_token.outputs.available == 'true'
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Resolve Debian package assets
        if: steps.packages_token.outputs.available == 'true'
        id: debs
        shell: bash
        run: |
          set -euo pipefail
          amd64_deb="$(find dist -maxdepth 1 -type f -name '*.deb' | grep -E '[_-]amd64\.deb$' | sort | head -n1)"
          arm64_deb="$(find dist -maxdepth 1 -type f -name '*.deb' | grep -E '[_-]arm64\.deb$' | sort | head -n1)"

          if [[ -z "$amd64_deb" || -z "$arm64_deb" ]]; then
            echo "Failed to locate amd64 and arm64 .deb artifacts in dist" >&2
            ls -la dist >&2
            exit 1
          fi

          {
            echo "amd64_name=$(basename "$amd64_deb")"
            echo "amd64_sha=$(sha256sum "$amd64_deb" | awk '{print $1}')"
            echo "arm64_name=$(basename "$arm64_deb")"
            echo "arm64_sha=$(sha256sum "$arm64_deb" | awk '{print $1}')"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Debian packages to packages repository release
        if: steps.packages_token.outputs.available == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          repository: ${{ env.PACKAGES_REPOSITORY }}
          token: ${{ env.PACKAGES_REPO_TOKEN }}
          tag_name: ${{ env.PACKAGE_RELEASE_TAG }}
          name: Codex ${{ needs.release.outputs.release_tag }} Debian packages
          files: dist/*.deb
          overwrite_files: true

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: steps.packages_token.outputs.available == 'true'
        with:
          repository: ${{ env.PACKAGES_REPOSITORY }}
          token: ${{ env.PACKAGES_REPO_TOKEN }}
          path: packages

      - name: Update packages manifest
        if: steps.packages_token.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 packages/scripts/update-package.py \
            --manifest packages/packages.json \
            --name codex \
            --repo "$PACKAGES_REPOSITORY" \
            --tag "$PACKAGE_RELEASE_TAG" \
            --version "${{ needs.release.outputs.version }}" \
            --asset "amd64:${{ steps.debs.outputs.amd64_name }}:${{ steps.debs.outputs.amd64_sha }}" \
            --asset "arm64:${{ steps.debs.outputs.arm64_name }}:${{ steps.debs.outputs.arm64_sha }}"

      - name: Commit and push packages manifest
        if: steps.packages_token.outputs.available == 'true'
        shell: bash
        working-directory: packages
        run: |
          set -euo pipefail
          if [[ -z "$(git status --short -- packages.json)" ]]; then
            echo "APT package manifest already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages.json
          git commit -m "codex ${{ needs.release.outputs.version }}"
          git pull --rebase origin main
          git push origin HEAD:main
